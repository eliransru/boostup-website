<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BoostUp - סוכנות דיגיטל מרקטינג</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: system-ui; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    const { useState } = React;

    function BoostUpWebsite() {
      const [isMenuOpen, setIsMenuOpen] = useState(false);

      const services = [
        { icon: '📱', title: 'Social Media Marketing', description: 'קמפיינים ממומנים בפייסבוק, אינסטגרם וטיקטוק' },
        { icon: '📊', title: 'ניהול קמפיינים', description: 'ניהול תקציבים וניתוח ROI בזמן אמת' },
        { icon: '🎬', title: 'ייצור תוכן', description: 'וידאו, גרפיקה וקופי שמוכר' },
        { icon: '🔍', title: 'SEO & SEM', description: 'קידום אתרים אורגני וממומן בגוגל' }
      ];

      const blogPosts = [
        { title: 'כיצד להפעיל קמפיין מוצלח ברשתות חברתיות', date: 'מרץ 12, 2026', readTime: '5 דק' },
        { title: 'ROI בשיווק דיגיטלי - איך למדוד הכל', date: 'מרץ 5, 2026', readTime: '7 דק' },
        { title: 'עלייה בעלויות פרסום? הנה הפתרון', date: 'פברואר 28, 2026', readTime: '6 דק' }
      ];

      return (
        <div className="bg-black text-white min-h-screen">
          {/* Nav */}
          <nav className="fixed w-full top-0 z-50 bg-black/80 backdrop-blur-md border-b border-teal-500/20">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center h-16">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 bg-gradient-to-br from-teal-400 to-teal-600 rounded-full flex items-center justify-center">
                  <span className="text-white font-bold text-sm">↗</span>
                </div>
                <span className="font-bold text-xl hidden sm:block">BoostUp</span>
              </div>
              <div className="hidden md:flex gap-8">
                {['Home', 'Services', 'Blog', 'About', 'Contact'].map(item => (
                  <button key={item} className="text-sm font-medium text-gray-300 hover:text-teal-400">
                    {item}
                  </button>
                ))}
              </div>
              <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="md:hidden text-2xl">
                {isMenuOpen ? '✕' : '☰'}
              </button>
            </div>
          </nav>

          {/* Hero */}
          <section className="pt-32 pb-20 px-4 text-center">
            <div className="max-w-4xl mx-auto">
              <div className="px-4 py-2 bg-teal-500/10 border border-teal-500/30 rounded-full text-teal-400 text-sm font-medium w-fit mx-auto mb-6">
                🚀 Digital Marketing Agency
              </div>
              <h1 className="text-6xl font-bold mb-6">הגדל את העסק שלך <span className="bg-gradient-to-r from-teal-400 to-orange-400 bg-clip-text text-transparent">דיגיטלית</span></h1>
              <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-8">
                BoostUp היא סוכנות דיגיטל מרקטינג שמתמחה בהצמיח עסקים בישראל.
              </p>
              <button className="px-8 py-3 bg-gradient-to-r from-teal-500 to-teal-600 rounded-lg font-semibold hover:from-teal-600 hover:to-teal-700">
                התחל קמפיין →
              </button>
            </div>
          </section>

          {/* Services */}
          <section className="py-20 px-4 bg-white/5">
            <div className="max-w-6xl mx-auto">
              <h2 className="text-4xl font-bold mb-12 text-center">מה אנחנו עושים</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {services.map((s, i) => (
                  <div key={i} className="p-6 bg-white/5 border border-white/10 rounded-xl hover:border-teal-500/50">
                    <div className="text-4xl mb-4">{s.icon}</div>
                    <h3 className="text-xl font-bold mb-2">{s.title}</h3>
                    <p className="text-gray-400">{s.description}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Blog */}
          <section className="py-20 px-4">
            <div className="max-w-6xl mx-auto">
              <h2 className="text-4xl font-bold mb-12 text-center">מהבלוג שלנו</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                {blogPosts.map((post, i) => (
                  <div key={i} className="p-6 bg-white/5 border border-white/10 rounded-xl hover:border-orange-500/50">
                    <div className="text-4xl mb-4">📝</div>
                    <h3 className="text-lg font-bold mb-3">{post.title}</h3>
                    <p className="text-sm text-gray-500">{post.date}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* About */}
          <section className="py-20 px-4 bg-white/5">
            <div className="max-w-4xl mx-auto text-center">
              <h2 className="text-4xl font-bold mb-6">אודותינו</h2>
              <p className="text-gray-400 text-lg">BoostUp הוקמה על ידי אלירן סרוגו, בעל ניסיון יותר מ-10 שנים בשיווק דיגיטלי בישראל.</p>
            </div>
          </section>

          {/* Contact */}
          <section className="py-20 px-4">
            <div className="max-w-2xl mx-auto">
              <h2 className="text-4xl font-bold mb-12 text-center">בואו נדבר</h2>
              <div className="bg-gradient-to-br from-teal-500/10 to-orange-500/10 border border-teal-500/30 rounded-xl p-8">
                <form className="space-y-4">
                  <input type="text" placeholder="שם" className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white" />
                  <input type="email" placeholder="אימייל" className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white" />
                  <textarea placeholder="הודעה" rows="4" className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white"></textarea>
                  <button type="submit" className="w-full px-6 py-3 bg-gradient-to-r from-teal-500 to-teal-600 rounded-lg font-semibold">שלח הודעה</button>
                </form>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="border-t border-white/10 bg-black/50 py-8 text-center">
            <p className="text-gray-500">© 2026 BoostUp. כל הזכויות שמורות.</p>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<BoostUpWebsite />);
  </script>
</body>
</html>
